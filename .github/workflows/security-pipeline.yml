name: SecureGrade Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ============================================
  # Job 1: SAST with CodeQL
  # ============================================
  codeql-analysis:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      matrix:
        service: [auth-service, result-service, grade-service, admin-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript/${{ matrix.service }}"

  # ============================================
  # Job 2: Dependency Security Check
  # ============================================
  dependency-check:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth-service, result-service, grade-service, admin-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd src/${{ matrix.service }}
          npm ci

      - name: Run npm audit
        run: |
          cd src/${{ matrix.service }}
          npm audit --audit-level=high
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.service }}
          path: src/${{ matrix.service }}/npm-audit.json
        if: always()

  # ============================================
  # Job 3: Build Docker Images
  # ============================================
  docker-build:
    name: Build and Scan Docker Images
    runs-on: ubuntu-latest
    needs: [dependency-check]

    strategy:
      matrix:
        service: [auth-service, result-service, grade-service, admin-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t securegarde-${{ matrix.service }}:${{ github.sha }} \
            -t securegarde-${{ matrix.service }}:latest \
            ./src/${{ matrix.service }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securegarde-${{ matrix.service }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          output: trivy-${{ matrix.service }}.txt

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt
        if: always()

  # ============================================
  # Job 4: Security Headers Check
  # ============================================
  security-headers:
    name: Security Headers Validation
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check security headers in code
        run: |
          echo "Checking for helmet middleware..."
          grep -r "helmet" src/*/src/app.js && \
            echo "✅ Helmet found in all services" || \
            echo "❌ Helmet missing in some services"

          echo "Checking for rate limiting..."
          grep -r "rateLimit" src/*/src/middleware/ && \
            echo "✅ Rate limiting found" || \
            echo "❌ Rate limiting missing"

          echo "Checking for input validation..."
          grep -r "express-validator" src/*/src/middleware/ && \
            echo "✅ Input validation found" || \
            echo "❌ Input validation missing"

          echo "Checking for JWT..."
          grep -r "jsonwebtoken" src/*/src/middleware/ && \
            echo "✅ JWT found" || \
            echo "❌ JWT missing"

  # ============================================
  # Job 5: Generate Security Report
  # ============================================
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [codeql-analysis, docker-build, security-headers]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary report
        run: |
          echo "# SecureGrade Security Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "## Run: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "## Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build + Trivy | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Headers | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Services Scanned" >> $GITHUB_STEP_SUMMARY
          echo "- auth-service (port 3001)" >> $GITHUB_STEP_SUMMARY
          echo "- result-service (port 3002)" >> $GITHUB_STEP_SUMMARY
          echo "- grade-service (port 3003)" >> $GITHUB_STEP_SUMMARY
          echo "- admin-service (port 3004)" >> $GITHUB_STEP_SUMMARY
