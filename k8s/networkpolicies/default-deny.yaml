# Default deny all ingress and egress in portal-prod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: portal-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Default deny all in data namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
